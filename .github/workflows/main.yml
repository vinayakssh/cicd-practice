name: CI-CD Practice
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install
      - run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hello-app:${{ github.sha }}

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Deploy to KodeKloud
        run: |
          set -e
          rm -rf repo
          git clone https://github.com/vinayakssh/cicd-practice.git repo
          cd repo
          git checkout ${{ github.sha }}
          echo "--- repo contents ---" && ls -la
          echo "--- k8s contents ---" && ls -la k8s/
          sed -i "s|_IMAGE_|${{ secrets.DOCKERHUB_USERNAME }}/hello-app:${{ github.sha }}|g" k8s/deployment.yaml
          kubectl apply -f k8s/
          kubectl -n dev rollout status deploy/hello-app --timeout=120s
